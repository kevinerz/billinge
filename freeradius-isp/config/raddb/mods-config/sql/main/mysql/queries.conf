# Tenant-scoped rewrite of the stock FreeRADIUS 3.2 MySQL queries.conf.
# Every query that touches a tenant-scoped table (see
# sql/003_add_tenant_id_columns.sql) filters or inserts by
# %{control:ISP-Tenant-Id}, which config/raddb/policy.d/isp_tenant sets
# before authorize/accounting/post-auth reach this module.
#
# Structure otherwise follows the stock 3.2 file. Validate with
# `freeradius -XC` after any edit here (Debian/Ubuntu names the binary
# `freeradius`, not `radiusd`) — unlang expansion syntax is unforgiving of
# typos.

sql_user_name = "%{User-Name}"

authorize_check_query = "\
	SELECT id, username, attribute, value, op \
	FROM ${authcheck_table} \
	WHERE username = '%{SQL-User-Name}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	ORDER BY id"

authorize_reply_query = "\
	SELECT id, username, attribute, value, op \
	FROM ${authreply_table} \
	WHERE username = '%{SQL-User-Name}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	ORDER BY id"

authorize_group_check_query = "\
	SELECT id, groupname, attribute, value, op \
	FROM ${groupcheck_table} \
	WHERE groupname = '%{SQL-Group}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	ORDER BY id"

authorize_group_reply_query = "\
	SELECT id, groupname, attribute, value, op \
	FROM ${groupreply_table} \
	WHERE groupname = '%{SQL-Group}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	ORDER BY id"

group_membership_query = "\
	SELECT groupname \
	FROM ${usergroup_table} \
	WHERE username = '%{SQL-User-Name}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	ORDER BY priority"

# Simultaneous-Use / checkrad concurrency check. Without the tenant_id
# filter here, a same-named subscriber in a DIFFERENT tenant with an open
# session would incorrectly block this login.
simul_count_query = "\
	SELECT COUNT(*) \
	FROM ${acct_table1} \
	WHERE username = '%{SQL-User-Name}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	AND acctstoptime IS NULL"

simul_verify_query = "\
	SELECT radacctid, acctsessionid, username, nasipaddress, nasportid, \
		framedipaddress, callingstationid, framedprotocol \
	FROM ${acct_table1} \
	WHERE username = '%{SQL-User-Name}' \
	AND tenant_id = '%{control:ISP-Tenant-Id}' \
	AND acctstoptime IS NULL"

accounting {
	reference = "%{tolower:type.%{Acct-Status-Type}.query}"

	column_list = "\
		tenant_id,	acctsessionid,	acctuniqueid,	username, \
		realm,		nasipaddress,	nasportid, \
		nasporttype,	acctstarttime,	acctupdatetime, \
		acctstoptime,	acctsessiontime,acctauthentic, \
		connectinfo_start, connectinfo_stop, \
		acctinputoctets,acctoutputoctets, \
		calledstationid, callingstationid, \
		acctterminatecause,	servicetype, \
		framedprotocol, framedipaddress"

	type {
		accounting-on {
			query = "\
				UPDATE ${....acct_table1} \
				SET acctstoptime = '%S', \
				acctsessiontime = 0, \
				acctterminatecause = '%{%{Acct-Terminate-Cause}:-NAS-Reboot}' \
				WHERE acctstoptime IS NULL \
				AND tenant_id = '%{control:ISP-Tenant-Id}' \
				AND nasipaddress = '%{NAS-IP-Address}'"
		}

		accounting-off {
			query = "${..accounting-on.query}"
		}

		start {
			query = "\
				INSERT INTO ${....acct_table1} \
					(${...column_list}) \
				VALUES \
					('%{control:ISP-Tenant-Id}', \
					'%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
					'%{SQL-User-Name}', \
					'%{Realm}', '%{NAS-IP-Address}', \
					'%{NAS-Port}', \
					'%{NAS-Port-Type}', '%S', \
					NULL, \
					NULL, \
					'0', \
					'%{Acct-Authentic}', \
					'%{Connect-Info}', \
					'', \
					'0', '0', \
					'%{Called-Station-Id}', \
					'%{Calling-Station-Id}', \
					'', \
					'%{Service-Type}', \
					'%{Framed-Protocol}', \
					'%{Framed-IP-Address}')"
		}

		interim-update {
			query = "\
				UPDATE ${....acct_table1} \
				SET acctupdatetime = '%S', \
				acctinterval = '%{%{Acct-Delay-Time}:-0}', \
				acctsessiontime = '%{Acct-Session-Time}', \
				acctinputoctets = '%{%{Acct-Input-Octets}:-0}', \
				acctoutputoctets = '%{%{Acct-Output-Octets}:-0}' \
				WHERE acctsessionid = '%{Acct-Session-Id}' \
				AND username = '%{SQL-User-Name}' \
				AND tenant_id = '%{control:ISP-Tenant-Id}' \
				AND nasipaddress = '%{NAS-IP-Address}'"
		}

		stop {
			query = "\
				UPDATE ${....acct_table1} \
				SET acctstoptime = '%S', \
				acctsessiontime = '%{Acct-Session-Time}', \
				acctinputoctets = '%{%{Acct-Input-Octets}:-0}', \
				acctoutputoctets = '%{%{Acct-Output-Octets}:-0}', \
				acctterminatecause = '%{Acct-Terminate-Cause}', \
				connectinfo_stop = '%{Connect-Info}' \
				WHERE acctsessionid = '%{Acct-Session-Id}' \
				AND username = '%{SQL-User-Name}' \
				AND tenant_id = '%{control:ISP-Tenant-Id}' \
				AND nasipaddress = '%{NAS-IP-Address}'"
		}
	}
}

postauth_query = "\
	INSERT INTO ${postauth_table} \
		(tenant_id, username, pass, reply, authdate) \
	VALUES ( \
		'%{control:ISP-Tenant-Id}', \
		'%{SQL-User-Name}', \
		'%{%{User-Password}:-%{Chap-Password}}', \
		'%{reply:Packet-Type}', \
		'%S')"

delete_stale_sessions = yes
