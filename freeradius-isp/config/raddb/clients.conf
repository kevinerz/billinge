# Minimal static clients.conf — real tenant NAS devices are NOT registered
# here. They live in the `nas` SQL table (see scripts/add_nas.sh) and are
# loaded via `read_clients = yes` / `client_table = "nas"` in mods-enabled/sql.
#
# This one static entry exists only for local radtest/health-check tooling.
client localhost {
	ipaddr = 127.0.0.1
	secret = $ENV{RADIUS_SHARED_SECRET_DEFAULT}
	shortname = localhost
	nas_type = other
}
